services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      SECRET: ${SECRET:?set SECRET in .env}
      DATABASE_DRIVER: postgres
      DATABASE_URL: postgres://opentrack:${POSTGRES_PASSWORD:-opentrack}@db:5432/opentrack
      PUBSUB_DRIVER: ${PUBSUB_DRIVER:-postgres}
      # OAuth login providers and the GitHub App are configured in-app (Admin →
      # Privacy / Integrations) and stored encrypted in the DB — no env vars.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Uploaded attachments are written here — mount a volume so they persist.
      UPLOADS_DIR: /app/data/uploads
    ports:
      - '${APP_PORT:-3000}:3000'
    volumes:
      # Persist uploaded attachments (and, on SQLite deploys, the DB) across rebuilds.
      - app_data:/app/data
    # Traefik labels are added at deploy time (see homelab-deploy). Example:
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.opentrack.rule=Host(`track.example.com`)

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: opentrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opentrack}
      POSTGRES_DB: opentrack
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U opentrack -d opentrack']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  app_data:
